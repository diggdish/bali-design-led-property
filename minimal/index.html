<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Dezier Studio portfolio images for Sacra|Stuja Cafe & Resto and Batuan Villa."
    />
    <title>Dezier Studio | Portfolio</title>
    <link rel="preload" as="image" href="../assets/portfolio/home-page.jpeg" />
    <link rel="stylesheet" href="minimal.css" />
    <script src="minimal-slider.js" defer></script>
  </head>
  <body>
    <header class="minimal-header">
      <a class="wordmark" href="../">Dezier Studio</a>
    </header>

    <main>
      <section class="minimal-hero" aria-label="Dezier Studio hero image">
        <figure>
          <img src="../assets/portfolio/home-page.jpeg" alt="Organic tropical architecture with a low sweeping roof and palm landscape." />
        </figure>
      </section>

      <section class="project-slider" aria-labelledby="sacra-title">
        <h2 id="sacra-title">Sacra|Stuja Cafe &amp; Resto</h2>
        <div class="slider-track" aria-label="Sacra|Stuja Cafe &amp; Resto image slider">
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-01.jpg" alt="Sacra|Stuja Cafe and Resto exterior with organic roofline." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-02.jpg" alt="Sacra|Stuja Cafe and Resto dining interior." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-03.jpg" alt="Sacra|Stuja Cafe and Resto timber roof interior." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-04.jpg" alt="Sacra|Stuja Cafe and Resto upper dining area." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-05.jpg" alt="Sacra|Stuja Cafe and Resto mezzanine and planting." />
          </figure>
        </div>
      </section>

      <section class="project-slider" aria-labelledby="batuan-title">
        <h2 id="batuan-title">Batuan Villa</h2>
        <div class="slider-track" aria-label="Batuan Villa image slider">
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-01.jpg" alt="Batuan Villa living space opening toward timber screens and garden." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-02.jpg" alt="Batuan Villa timber wardrobe detail." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-03.jpg" alt="Batuan Villa courtyard and timber screens." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-04.jpg" alt="Batuan Villa entrance with timber ceiling and stone wall." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-05.jpg" alt="Batuan Villa pool terrace and planting." />
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
