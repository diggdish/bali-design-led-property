<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Dezier Studio portfolio images for Sacra|Stuja Cafe & Resto and Batuan Villa."
    />
    <title>Dezier Studio | Portfolio</title>
    <link rel="preload" as="image" href="../assets/portfolio/home-page.jpeg" />
    <link rel="stylesheet" href="minimal.css" />
    <script src="minimal-slider.js" defer></script>
  </head>
  <body>
    <header class="minimal-header">
      <a class="wordmark" href="../">Dezier Studio</a>
      <button class="menu-toggle" type="button" aria-label="Open menu" aria-controls="sidebar-menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <aside class="sidebar-menu" id="sidebar-menu" aria-hidden="true">
      <div class="sidebar-panel">
        <nav class="sidebar-rows" aria-label="Dezier Studio menu">
          <section class="sidebar-row">
            <button class="sidebar-row-toggle" type="button" aria-expanded="false">About</button>
            <div class="sidebar-row-content">
              <p>Dezier Studio presents selected tropical residential and hospitality work by Laksana Matra.</p>
            </div>
          </section>
          <section class="sidebar-row">
            <button class="sidebar-row-toggle" type="button" aria-expanded="false">Projects</button>
            <div class="sidebar-row-content project-categories">
              <div>
                <p>Residential</p>
                <a href="#batuan-title">Batuan Villa</a>
              </div>
              <div>
                <p>Restaurant &amp; Bar</p>
                <a href="#sacra-title">Sacra|Stuja Cafe &amp; Resto</a>
              </div>
            </div>
          </section>
          <section class="sidebar-row">
            <button class="sidebar-row-toggle" type="button" aria-expanded="false">Contacts</button>
            <div class="sidebar-row-content">
              <a href="mailto:laksanamatraa@gmail.com">laksanamatraa@gmail.com</a>
              <a href="tel:+6281338716636">+6281338716636</a>
              <a href="https://www.instagram.com/dezier.studio" target="_blank" rel="noreferrer">dezier.studio</a>
            </div>
          </section>
        </nav>
      </div>
    </aside>

    <main>
      <section class="minimal-hero hero-slider" aria-label="Dezier Studio hero image slider">
        <figure class="hero-slide is-active">
          <img src="../assets/portfolio/home-page.jpeg" alt="Organic tropical architecture with a low sweeping roof and palm landscape." />
        </figure>
        <figure class="hero-slide">
          <img src="../assets/portfolio/home-page-2.jpeg" alt="Tropical villa courtyard with stone walls, timber screens, and planting." />
        </figure>
        <figure class="hero-slide">
          <img src="../assets/portfolio/home-page-3.jpeg" alt="Layered tropical restaurant architecture with timber walkways and garden planting." />
        </figure>
        <figure class="hero-slide">
          <img src="../assets/portfolio/home-page-4.jpeg" alt="Resort villa garden with stone walls, timber rooflines, and outdoor terraces." />
        </figure>
        <div class="hero-dots" aria-label="Hero image controls">
          <button type="button" class="is-active" aria-label="Show image 1" aria-current="true"></button>
          <button type="button" aria-label="Show image 2"></button>
          <button type="button" aria-label="Show image 3"></button>
          <button type="button" aria-label="Show image 4"></button>
        </div>
      </section>

      <section class="project-slider" aria-labelledby="sacra-title">
        <h2 id="sacra-title">Sacra|Stuja Cafe &amp; Resto</h2>
        <div class="slider-track" aria-label="Sacra|Stuja Cafe &amp; Resto image slider">
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-01.jpg" alt="Sacra|Stuja Cafe and Resto exterior with organic roofline." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-02.jpg" alt="Sacra|Stuja Cafe and Resto dining interior." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-03.jpg" alt="Sacra|Stuja Cafe and Resto timber roof interior." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-04.jpg" alt="Sacra|Stuja Cafe and Resto upper dining area." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/sacra-stuja-05.jpg" alt="Sacra|Stuja Cafe and Resto mezzanine and planting." />
          </figure>
        </div>
      </section>

      <section class="project-slider" aria-labelledby="batuan-title">
        <h2 id="batuan-title">Batuan Villa</h2>
        <div class="slider-track" aria-label="Batuan Villa image slider">
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-01.jpg" alt="Batuan Villa living space opening toward timber screens and garden." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-02.jpg" alt="Batuan Villa timber wardrobe detail." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-03.jpg" alt="Batuan Villa courtyard and timber screens." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-04.jpg" alt="Batuan Villa entrance with timber ceiling and stone wall." />
          </figure>
          <figure class="slide">
            <img src="../assets/portfolio/batuan-villa-05.jpg" alt="Batuan Villa pool terrace and planting." />
          </figure>
        </div>
      </section>
    </main>
  </body>
</html>
